{% extends "base.html" %}

{% block title %}Gallery{% endblock %}

{% block content %}
Gallery
{% endblock %}

{% block body %}

<div class="hero-animate max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
        
        {% for post in posts %}
            {% if post.images %}
            <div>
                <img 
                    src="{{ post.images.url }}"
                    alt="Gallery Image"
                    class="h-auto max-w-full rounded-xl transition duration-300 hover:scale-105 hover:shadow-2xl">
            </div>
            {% endif %}
        {% empty %}
            <p class="col-span-full text-center text-white">
                No gallery images uploaded.
            </p>
        {% endfor %}

    </div>

</div>

{% endblock %}
