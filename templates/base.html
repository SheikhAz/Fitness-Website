{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/png" href="{% static 'images/favicons.png' %}">
  <title>EnterGYM {% block title %}{% endblock %}</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <!-- Orbitron + Rajdhani needed by the location modal -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

  <!-- PWA manifest + mobile meta tags -->
  <link rel="manifest" href="{% static 'js/manifest.json' %}">
  <meta name="theme-color" content="#00dcff">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- CSS -->
  <link rel="stylesheet" href="{% static 'css/base.css' %}">
  <link rel="stylesheet" href="{% static 'css/loc_modal.css' %}">
  {% block link %}{% endblock %}
</head>

<body>

  <!-- EXTRA CONTENT (MESSAGES ETC) -->
  <div id="extra">{% block message %}{% endblock %}</div>

  <!-- HERO SECTION -->
  <section class="hero">

    <!-- Background -->
    <img src="{% static 'images/Fitness.webp' %}" class="hero-bg" alt="Gym Background">
    <div class="overlay"></div>

    <!-- TOP BAR -->
    <div class="topbar">
      <div class="topbar-inner">
        <div>EnterGYM in Bhilai, Chhattisgarh</div>
        <div class='left-inner'>Join: (+91) 7000032565</div>
      </div>
      <div class="divider"></div>
    </div>

    <!-- NAVBAR -->
    <nav class="navbar hero-animate">
      <div class="nav-inner">
        <a href="/" class="logo">
          <img src="{% static 'images/Logo1s.png' %}" alt="EnterName Gym Logo" class="logo-img">
        </a>
      </div>
    </nav>

    <!-- HERO CONTENT -->
    <div id="heroContent" class="hero-content">
      <h1>{% block heading %}{% endblock %}</h1>
    </div>

    <!-- BODY CONTENT -->
    {% block content %}{% endblock %}

  </section>

  <!-- JS -->
  <script src="{% static 'js/base.js' %}"></script>

  <!-- GYM_CONFIG — values injected automatically by context_processors.py -->
  <script>
    window.GYM_CONFIG = {
      gymLat:           {{ GYM_LATITUDE }},
      gymLng:           {{ GYM_LONGITUDE }},
      radius:           {{ GYM_RADIUS_METERS }},
      userId:           {% if user.is_authenticated %}{{ user.id }}{% else %}null{% endif %},
      isAuthenticated:  {% if user.is_authenticated %}true{% else %}false{% endif %},
      isEnrolled:       {% if is_enrolled %}true{% else %}false{% endif %},
      onAttendancePage: {% if 'attendence' in request.path %}true{% else %}false{% endif %},
      alreadyMarked:    {% if already_marked %}true{% else %}false{% endif %}
    };

  </script>
  <script src="{% static 'js/loc_permission.js' %}"></script>
  <script src="{% static 'js/geo_attendance.js' %}"></script>

</body>
</html>
